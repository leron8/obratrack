services:
  - type: web
    name: obratrack-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:backend
    startCommand: npm run start -w backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_WHISPER_MODEL
        value: whisper-1
      - key: OPENAI_PARSING_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEFAULT_COMPANY_ID
        value: ""
      - key: DEFAULT_CURRENCY
        value: MXN
    autoDeploy: true
